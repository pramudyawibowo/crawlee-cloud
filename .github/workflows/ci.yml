name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # The workspace (vitest.workspace.ts) already restricts the run to
      # packages/cli, packages/api, packages/runner. The previous --project
      # filters matched on test.name, which none of the package configs set
      # — so vitest exited with "No test files found".
      - run: npx vitest run

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: crawlee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      minio:
        # bitnami/minio was retired by Bitnami in late 2024; the
        # bitnamilegacy namespace is their drop-in archive of the old
        # catalog (same env vars, same auto-start behavior, same health
        # endpoint). If even the legacy namespace is removed in the future,
        # pin a versioned tag like bitnamilegacy/minio:2025.7.23-debian-12-r5.
        image: bitnamilegacy/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Create MinIO bucket
        run: |
          curl -s https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set ci http://localhost:9000 minioadmin minioadmin
          mc mb ci/crawlee-test --ignore-existing
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/crawlee_test
          REDIS_URL: redis://localhost:6379
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET: crawlee-test
          S3_REGION: us-east-1
          S3_FORCE_PATH_STYLE: 'true'
          API_SECRET: integration-test-secret-at-least-32-characters
          CORS_ORIGINS: http://localhost:3000
          NODE_ENV: test
        run: npx vitest run --config vitest.integration.config.ts
